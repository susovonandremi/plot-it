services:
  - type: web
    name: plot-ai-backend
    plan: free
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: PORT
        value: "8000"
      - key: ALLOWED_ORIGINS
        value: "http://localhost:5173,http://localhost:3000,https://plot-ai-frontend.onrender.com"
      - key: GROQ_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: plot-ai-db
          property: connectionString

databases:
  - name: plot-ai-db
    plan: free
